<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Cardápio</title>
</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-5">Cardápio</h1>

    <div class="row">

        <div class="col-md-4">

            <div class="card">

                <img src="{{ url_for('static', filename='hamburguer.jpg') }}" class="card-img-top">

                <div class="card-body">

                    <h5 class="card-title">Hambúrguer</h5>

                    <p>R$ 25,00</p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card">

                <img src="{{ url_for('static', filename='pizza.jpg') }}" class="card-img-top">

                <div class="card-body">

                    <h5 class="card-title">Pizza</h5>

                    <p>R$ 40,00</p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card">

                <img src="{{ url_for('static', filename='batata.jpg') }}" class="card-img-top">

                <div class="card-body">

                    <h5 class="card-title">Batata Frita</h5>

                    <p>R$ 18,00</p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
